<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Proyecto en rama 1</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            margin-top: 50px;
        }
        h1 {
            color: #333;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <h1>Hola, Valentín 👋</h1>
    <p>Esta es tu primera página web.</p>

    <button onclick="saludar()">Haz clic</button>

    <script>
        function saludar() {
            alert("¡Bienvenido a tu página web!");
        }
    </script>

</body>
</html>
